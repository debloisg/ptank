onlyBuiltDependencies:
  - '@parcel/watcher'
  - better-sqlite3
  - esbuild
  - sharp
  - workerd

# Force a single @nuxtjs/mdc across the tree so the content build (writes D1)
# and nuxt-studio (compares against D1) serialize markdown identically.
# content@3.15 wants ^0.22.1, nuxt-studio@1.7 declares ^0.21.1 (disjoint ranges).
# Pinned DOWN to 0.21.1 (Studio's native version): forcing Studio onto 0.22.2
# fixed the conflict comparison but destabilized its tiptap editor
# (contentMatchAt "invalid content" on edit). 0.21.1 keeps the editor stable;
# @nuxt/content 3.15 runs on 0.21.1 too (build verified). Requires redeploy so
# D1 is rebuilt with the 0.21.1 serializer. See a-propos.
overrides:
  unhead: ^3.2.3
  '@unhead/vue@^3.0.0': ^3.2.3
  '@unhead/bundler': ^3.2.3
  '@nuxtjs/mdc': 0.21.1
