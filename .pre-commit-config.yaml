# Runs gitleaks on every commit to block secrets from being committed.
# Activate once:  pre-commit install
# gitleaks itself is fetched & managed by pre-commit — no separate install.
repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks

  # Canonicalize content markdown to the exact serialized form the @nuxt/content
  # build writes to D1 (and that nuxt-studio round-trips), so hand edits (nvim)
  # match Studio publishes and don't trigger phantom Studio conflicts. Rewrites
  # staged files; re-stage and re-commit if it changes anything (formatter norm).
  - repo: local
    hooks:
      - id: canonicalize-content
        name: Canonicalize Nuxt content markdown
        entry: node scripts/canonicalize-content.mjs
        language: system
        files: ^content/.*\.md$
